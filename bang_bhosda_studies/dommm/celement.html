// learn to create and manipulate elements in the DOM
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bhang bhosda</title>
</head>
<body style="background-color: black; color: white;">
    <ul class = "lang">
        <li> javascript</li>
    </ul>
</body>
<script>
    const div = document.createElement('div');
    console.log(div);
    
    div.className = 'main';
    div.id = Math.round(Math.random() * 1000);
    div.setAttribute('title', 'this is a div');
    div.style.backgroundColor = 'red';
    div.style.padding = '20px';
    div.innerText = 'this is a div created using JavaScript';

    const addtext = document.createTextNode('this is a text node');
    div.appendChild(addtext);// div.innerHTML += '<p>this is a paragraph</p>';

    document.body.appendChild(div);// document.body.prepend(div);

    //function to add element  in dom
    function addElement(langname)
    {
        const li = document.createElement('li');
        li.innerText = langname;
        document.querySelector('ul').appendChild(li);
    }
    addElement('python');
    addElement('java');

    function addOptLang(langname)
    {
        const li = document.createElement('li');
        li.appendChild(document.createTextNode(langname));
        document.querySelector('ul').appendChild(li);
    }
    addOptLang('c++');
    addOptLang('javascript');
    addOptLang('java');

    //edit
    const secondLi = document.querySelector("li:nth-child(2)");
    secondLi.innerText = 'python is the best language';

    const newli = document.createElement('li');
    newli.innerText = 'ruby';
    secondLi.replaceWith(newli); // replace the second li with newli
    
    //edit
    const firstLang = document.querySelector("li:first-child");
    firstLang.outerHTML = '<li> typescript </li>'; // replace the first li with new li using outerHTML

    //remove
    const lastLang = document.querySelector("li:last-child");
    lastLang.remove(); // remove the last li element
    
</script>
</html>
